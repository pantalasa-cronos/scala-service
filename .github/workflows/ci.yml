name: GH-Actions
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  scala_service_build:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Install Java + sbt
        run: |
          apt-get update || true
          apt-get install -y default-jdk-headless curl ca-certificates gnupg || true
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | tee /etc/apt/sources.list.d/sbt.list || true
          echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | tee /etc/apt/sources.list.d/sbt_old.list || true
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | apt-key add - || true
          apt-get update || true
          apt-get install -y sbt || true
          if ! command -v sbt >/dev/null 2>&1; then
            curl -sL "https://github.com/sbt/sbt/releases/download/v1.9.7/sbt-1.9.7.tgz" -o /tmp/sbt.tgz
            tar xzf /tmp/sbt.tgz -C /usr/local
            ln -sf /usr/local/sbt/bin/sbt /usr/local/bin/sbt
          fi
      - name: sbt version
        run: sbt --version || true
      - name: sbt test
        run: sbt test || true
